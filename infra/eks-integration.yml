AWSTemplateFormatVersion: 2010-09-09
Description: Integration EKS Cluster that reuses the shared CatalystAI VPC

Parameters:
  ClusterName:
    Type: String
    Default: integration-eks-cluster
  NodeInstanceType:
    Type: String
    Default: t3.medium
  DesiredCapacity:
    Type: Number
    Default: 2

Resources:
  IntegrationSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !ImportValue CatalystAI-VPC-Id
      CidrBlock: 10.0.3.0/24
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: IntegrationSubnet1

  IntegrationSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !ImportValue CatalystAI-VPC-Id
      CidrBlock: 10.0.4.0/24
      AvailabilityZone: !Select [1, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: IntegrationSubnet2

  IntegrationSubnetRouteTableAssociation1:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref IntegrationSubnet1
      RouteTableId: !ImportValue CatalystAI-PublicRouteTable-Id

  IntegrationSubnetRouteTableAssociation2:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref IntegrationSubnet2
      RouteTableId: !ImportValue CatalystAI-PublicRouteTable-Id

  SharedVpcSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow communication in integration EKS cluster
      VpcId: !ImportValue CatalystAI-VPC-Id
      SecurityGroupIngress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  EKSClusterRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: eks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEKSClusterPolicy

  EKSCluster:
    Type: AWS::EKS::Cluster
    Properties:
      Name: !Ref ClusterName
      RoleArn: !GetAtt EKSClusterRole.Arn
      ResourcesVpcConfig:
        SubnetIds:
          - !Ref IntegrationSubnet1
          - !Ref IntegrationSubnet2
        SecurityGroupIds:
          - !Ref SharedVpcSecurityGroup

  NodeGroupRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: 2012-10-17
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEKSWorkerNodePolicy
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly
        - arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy

  NodeGroup:
    Type: AWS::EKS::Nodegroup
    DependsOn: EKSCluster
    Properties:
      ClusterName: !Ref EKSCluster
      NodeRole: !GetAtt NodeGroupRole.Arn
      Subnets:
        - !Ref IntegrationSubnet1
        - !Ref IntegrationSubnet2
      ScalingConfig:
        DesiredSize: !Ref DesiredCapacity
        MaxSize: 3
        MinSize: 1
      InstanceTypes:
        - !Ref NodeInstanceType

Outputs:
  EKSClusterName:
    Description: Name of the integration EKS Cluster
    Value: !Ref ClusterName
