name: Deploy App to EKS

on:
  push:
    branches:
      - main 
  workflow_dispatch: # Allow manual triggering of the workflow

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v1
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    # Check if EKS cluster exists
    - name: Check if EKS Cluster exists
      run: |
        if ! aws eks describe-cluster --name ${{ secrets.EKS_CLUSTER_NAME }} --region ${{ secrets.AWS_REGION }}; then
          echo "EKS cluster does not exist. Please run the infra provisioning workflow first."
          exit 1
        fi

    # Login to ECR
    - name: Login to Amazon ECR
      id: ecr-login
      uses: aws-actions/amazon-ecr-login@v1

    - name: Set Image Tags
      id: image-tag
      run: |
        echo "IMAGE_TAG=$(date +%s)" >> $GITHUB_ENV
        echo "::set-output name=tag::$(date +%s)"

    # Build and Push Docker Image to ECR
    - name: Build and Push Docker Image
      env:
        ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
        ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
        IMAGE_TAG: ${{ steps.image-tag.outputs.tag }}
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

    # Setup kubectl
    - name: Setup kubectl
      uses: azure/setup-kubectl@v1
      with:
        version: 'latest'

    # Ensure AWS CLI is installed
    - name: Install AWS CLI
      run: |
        curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
        unzip awscliv2.zip
        sudo ./aws/install --update
        aws --version

    - name: Print Env Vars
      run: |
        echo "AWS_REGION: ${{ secrets.AWS_REGION }}"
        echo "EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}"

    # Update kubeconfig
    - name: Update kubeconfig with debug
      run: |
        aws eks update-kubeconfig --name ${{ secrets.EKS_CLUSTER_NAME }} --region ${{ secrets.AWS_REGION }} --debug
      env:
        AWS_REGION: ${{ secrets.AWS_REGION }}
        EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}

    # Debug: Show kubeconfig
    - name: Debug kubeconfig
      run: |
        ls -la ~/.kube || true
        cat ~/.kube/config || true

    # Create/Update kubernetes Secret (for API keys)
    - name: Create Kubernetes secret for API keys
      run: |
        kubectl create secret generic product-assistant-secrets \
          --from-literal=OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
          --from-literal=GOOGLE_API_KEY="${{ secrets.GOOGLE_API_KEY }}" \
          --from-literal=ASTRA_DB_API_ENDPOINT="${{ secrets.ASTRA_DB_API_ENDPOINT }}" \
          --from-literal=ASTRA_DB_APPLICATION_TOKEN="${{ secrets.ASTRA_DB_APPLICATION_TOKEN }}" \
          --from-literal=ASTRA_DB_KEYSPACE="${{ secrets.ASTRA_DB_KEYSPACE }}" \
          --dry-run=client -o yaml | kubectl apply -f -

    # Deploy manifests
    - name: Apply Kubernetes manifests
      run: |
        kubectl apply -f k8/deployment.yaml
        kubectl apply -f k8/service.yaml

    - name: Patch deployment with new image tag
      env:
        ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
        ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
        IMAGE_TAG: ${{ steps.image-tag.outputs.tag }}
      run: |
        kubectl set image deployment/catalyst-ai catalyst-ai=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

    # Verify rollout
    - name: Verify Deployment
      run: |
        set -e
        if ! kubectl rollout status deployment/catalyst-ai --timeout=120s; then
          echo "Rollout failed, collecting debug info..."
          kubectl describe deployment/product-assistant || true
          kubectl get pods -o wide || true
          for pod in $(kubectl get pods -l app=product-assistant -o jsonpath='{.items[*].metadata.name}'); do
            echo "--- Logs for $pod ---"
            kubectl logs $pod || true
          done
          exit 1
        fi

    # Show Service details
    - name: Show Service details
      run: |
        kubectl get service catalyst-ai-service -o wide