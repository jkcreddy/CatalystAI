apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-server-kubernetes
  labels:
    app: mcp-server-kubernetes
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-server-kubernetes
  template:
    metadata:
      labels:
        app: mcp-server-kubernetes
    spec:
      containers:
      - name: mcp-server-kubernetes
        image: 014498647103.dkr.ecr.us-east-1.amazonaws.com/mcp-server-kubernetes:latest
        imagePullPolicy: Always
        command:
        - node
        - dist/index.js
        args:
        - --transport
        - sse
        - --host
        - 0.0.0.0
        - --port
        - "3000"
        env:
        - name: ENABLE_UNSAFE_SSE_TRANSPORT
          value: "true"
        ports:
        - name: mcp
          containerPort: 3000
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 20
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /ready
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-server-kubernetes-service
  labels:
    app: mcp-server-kubernetes
spec:
  type: ClusterIP
  selector:
    app: mcp-server-kubernetes
  ports:
  - name: mcp
    protocol: TCP
    port: 3000
    targetPort: 3000
